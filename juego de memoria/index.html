<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex flex-column justify-content-center align-items-center py-4">
        <!-- Título del juego -->
        <h1 class="mb-4 text-primary fw-bold">Juego de Memoria</h1>
        
        <!-- Panel de información -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex gap-4 justify-content-center flex-wrap">
                    <div class="text-center">
                        <span class="text-muted small">Movimientos</span>
                        <div id="moves" class="fs-4 fw-bold text-primary">0</div>
                    </div>
                    
                </div>
            </div>
        </div>
        
        <!-- Tablero de cartas -->
        <div id="game-board" class="game-board mb-4">
            <!-- Las cartas se generan dinámicamente con JavaScript -->
        </div>
        
        <!-- Botón de reiniciar -->
        <button id="restart-btn" class="btn btn-primary btn-lg px-5 shadow">
            Reiniciar Juego
        </button>
        
        <!-- Mensaje de victoria -->
        <div id="victory-message" class="alert alert-primary mt-4 text-center d-none shadow-lg" role="alert">
            <h4 class="alert-heading">¡Felicidades! 🎉</h4>
            <p class="mb-2">Has encontrado todas las parejas.</p>
            <hr>
            <p class="mb-0">
                <strong>Tiempo:</strong> <span id="final-time">00:00</span> | 
                <strong>Movimientos:</strong> <span id="final-moves">0</span>
            </p>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
